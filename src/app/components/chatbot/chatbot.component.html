<!-- ── Chat Panel ── -->
<div
  class="chat-panel"
  [class.visible]="open"
  [ngStyle]="panelStyle"
  role="dialog"
  aria-label="Assistant du tournoi">

  <!-- Header -->
  <div class="chat-header">
    <div class="chat-header-info">
      <div class="chat-avatar">⚽</div>
      <div>
        <p class="chat-title">Assistant Tournoi</p>
        <p class="chat-subtitle">Étoile Universelle 2026</p>
      </div>
    </div>
    <button class="chat-close" (click)="closeChat()" aria-label="Fermer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Messages -->
  <div class="chat-messages" #msgContainer>
    <div
      *ngFor="let msg of messages"
      class="chat-msg"
      [class.user]="msg.role === 'user'"
      [class.bot]="msg.role === 'bot'">
      <div class="msg-bubble" [class.loading-bubble]="msg.loading">
        <ng-container *ngIf="!msg.loading">{{ msg.text }}</ng-container>
        <ng-container *ngIf="msg.loading">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </ng-container>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="chat-input-row">
    <input
      class="chat-input"
      type="text"
      [(ngModel)]="input"
      (keydown)="onKeydown($event)"
      placeholder="Posez votre question..."
      [disabled]="sending"
      maxlength="500"
      autocomplete="off"
      aria-label="Message" />
    <button
      class="chat-send"
      (click)="sendMessage()"
      [disabled]="!input.trim() || sending"
      aria-label="Envoyer">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</div>

<!-- ── FAB ── -->
<button
  class="chat-fab"
  [class.is-open]="open"
  [class.dragging]="isDragging"
  [style.left]="fabLeft !== null ? fabLeft + 'px' : null"
  [style.top]="fabTop !== null ? fabTop + 'px' : null"
  [style.right]="fabLeft !== null ? 'auto' : null"
  [style.bottom]="fabTop !== null ? 'auto' : null"
  (pointerdown)="onFabPointerDown($event)"
  (pointermove)="onFabPointerMove($event)"
  (pointerup)="onFabPointerUp($event)"
  aria-label="Ouvrir l'assistant">
  <svg *ngIf="!open" width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <svg *ngIf="open" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</button>
