<div class="login-page">
  <div class="login-card">
    <img src="fju.jpg" alt="Logo Étoile Universelle" class="login-logo" />
    <h1 class="login-title">Espace Admin</h1>
    <p class="login-sub">Tournoi de Football 2026 · Étoile Universelle de Grand Bassam</p>

    <div class="error-banner" *ngIf="error">⚠ {{ error }}</div>

    <div class="form-group">
      <label>Identifiant</label>
      <input type="text" [(ngModel)]="username" placeholder="admin" (keyup.enter)="login()" autocomplete="username" />
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" (keyup.enter)="login()" autocomplete="current-password" />
    </div>

    <button (click)="login()" [disabled]="loading" class="btn-login">
      {{ loading ? 'Connexion...' : '→ Se connecter' }}
    </button>

    <a routerLink="/" class="back-link">← Retour au site public</a>
  </div>
</div>
