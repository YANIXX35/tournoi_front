<nav class="navbar" [class.scrolled]="scrolled">
  <a class="navbar-brand" routerLink="/" (click)="closeMenu()">
    <img src="fju.jpg" alt="Logo Étoile Universelle" class="brand-logo" />
    <div class="brand-text">
      <span class="brand-title">Étoile Universelle de Grand Bassam</span>
      <span class="brand-sub">Tournoi Football 2026</span>
    </div>
  </a>

  <!-- Desktop links -->
  <div class="navbar-links desktop-links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Accueil</a>
    <a routerLink="/matchs" routerLinkActive="active">Matchs</a>
    <a routerLink="/buteurs" routerLinkActive="active">Buteurs</a>
    <a routerLink="/resultats" routerLinkActive="active">Résultats</a>
    <a routerLink="/equipes" routerLinkActive="active">Équipes</a>
    <a routerLink="/galerie" routerLinkActive="active">Galerie</a>
    <a routerLink="/inscription" routerLinkActive="active" class="nav-cta">✦ S'inscrire</a>
  </div>

  <!-- Hamburger button (mobile only) -->
  <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- Mobile menu overlay -->
<div class="mobile-overlay" [class.visible]="menuOpen" (click)="closeMenu()"></div>

<!-- Mobile drawer -->
<div class="mobile-menu" [class.open]="menuOpen">
  <div class="mobile-menu-header">
    <span><img src="fju.jpg" alt="Étoile Universelle" style="width:22px;height:22px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:6px;" />Menu</span>
    <button class="close-menu" (click)="closeMenu()">✕</button>
  </div>
  <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">🏠 Accueil</a>
  <a routerLink="/matchs" routerLinkActive="active" (click)="closeMenu()">📅 Matchs</a>
  <a routerLink="/buteurs" routerLinkActive="active" (click)="closeMenu()">⚽ Buteurs</a>
  <a routerLink="/resultats" routerLinkActive="active" (click)="closeMenu()">🏆 Résultats</a>
  <a routerLink="/equipes" routerLinkActive="active" (click)="closeMenu()">👥 Équipes</a>
  <a routerLink="/galerie" routerLinkActive="active" (click)="closeMenu()">📷 Galerie</a>
  <a routerLink="/inscription" routerLinkActive="active" (click)="closeMenu()" class="mobile-cta">✦ S'inscrire — Gratuit</a>
</div>

<main>
  <router-outlet></router-outlet>
</main>

<footer class="site-footer">
  ⚽ Tournoi de Football — Étoile Universelle de Grand Bassam 2026 · Tous droits réservés
</footer>
